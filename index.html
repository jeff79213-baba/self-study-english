<!DOCTYPE html>

<title>英單發音小幫手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#f0f4f8,#d9e2ec);min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans TC',sans-serif;display:flex;justify-content:center;align-items:flex-start;padding:20px}

<body>

<script>
const VOWELS=['AA','AE','AH','AO','AW','AY','EH','ER','EY','IH','IY','OW','OY','UH','UW'];

function splitSyllables(phonemes){
  const clean=phonemes.map(p=>p.replace(/[012]$/,''));
  const vPos=[];
  clean.forEach((p,i)=>{if(VOWELS.includes(p))vPos.push(i)});
  if(vPos.length<=1)return[phonemes];
  const result=[];
  let start=0;
  for(let i=0;i<vPos.length;i++){
    const cv=vPos[i],nv=vPos[i+1];
    if(nv===undefined){
      result.push(phonemes.slice(start));
    }else{
      const between=nv-cv-1;
      if(between<=1){
        result.push(phonemes.slice(start,cv+1));
        start=cv+1;
      }else{
        result.push(phonemes.slice(start,cv+2));
        start=cv+2;
      }
    }
  }
  return result;
}

  'H+ER':'赫','H+EY':'黑','H+IH':'希','H+IY':'希','H+OW':'侯','H+UH':'胡','H+UW':'胡',
  'HH+AA':'哈','HH+AE':'海','HH+AH':'哈','HH+AY':'海','HH+EH':'赫','HH+EY':'黑','HH+IH':'希',
  'HH+IY':'希','HH+OW':'侯',
  'R+AA':'拉','R+AE':'萊','R+AH':'拉','R+AO':'勞','R+AW':'勞','R+AY':'萊','R+EH':'瑞',
  'R+ER':'爾','R+EY':'瑞','R+IH':'瑞','R+IY':'瑞','R+OW':'柔','R+UH':'如','R+UW':'如',
  'F+AA':'法','F+AE':'法','F+AH':'法','F+AO':'佛','F+AW':'佛','F+AY':'法','F+EH':'費',
  'F+ER':'佛','F+EY':'費','F+IH':'費','F+IY':'費','F+OW':'否','F+UH':'夫','F+UW':'夫',
  'V+AA':'瓦','V+AE':'維','V+AH':'瓦','V+AY':'維','V+EH':'維','V+ER':'佛','V+EY':'維',
  'V+IH':'維','V+IY':'維','V+UH':'屋','V+UW':'屋',
  'W+AA':'瓦','W+AE':'瓦','W+AH':'瓦','W+AY':'外','W+EH':'威','W+EY':'威','W+IH':'威',
  'W+IY':'威','W+OW':'我','W+UH':'屋',
  'Y+AA':'雅','Y+AE':'耶','Y+AH':'雅','Y+AY':'耶','Y+EH':'耶','Y+EY':'耶','Y+IH':'伊',
  'Y+IY':'伊','Y+OW':'唷',
  'Z+AA':'薩','Z+AE':'賽','Z+AH':'薩','Z+AY':'賽','Z+EH':'澤','Z+EY':'澤','Z+IH':'茲',
  'Z+IY':'茲','Z+OW':'鄒',
  'CH+AA':'查','CH+AE':'柴','CH+AH':'查','CH+AO':'超','CH+AW':'超','CH+AY':'柴','CH+EH':'徹',
  'CH+ER':'徹','CH+EY':'徹','CH+IH':'奇','CH+IY':'奇','CH+OW':'抽','CH+UH':'出','CH+UW':'出',
  'JH+AA':'賈','JH+AE':'傑','JH+AH':'賈','JH+AO':'交','JH+AW':'交','JH+AY':'傑','JH+EH':'傑',
  'JH+ER':'哲','JH+EY':'傑','JH+IH':'吉','JH+IY':'吉','JH+OW':'究','JH+UH':'朱','JH+UW':'朱',

  'TH+IY':'西','TH+OW':'搜','TH+UH':'蘇',
  'DH+AA':'扎','DH+AE':'宰','DH+AH':'扎','DH+AY':'宰','DH+EH':'澤','DH+EY':'澤','DH+IH':'茲',
  'DH+IY':'茲',
  'AA':'阿','AE':'艾','AH':'阿','AO':'奧','AW':'奧','AY':'愛','EH':'欸','ER':'爾',
  'EY':'欸','IH':'伊','IY':'伊','OW':'歐','OY':'歐伊','UH':'屋','UW':'屋'

const CODA_CN={'L':'歐','R':'爾','N':'恩','M':'姆','NG':'嗯','T':'特','D':'德','K':'克',
  'P':'普','S':'斯','F':'夫','V':'五','TH':'斯','DH':'茲','SH':'許','CH':'區','JH':'居','Z':'茲'};

function syllToChinese(syllable){
  const clean=syllable.map(p=>p.replace(/[012]$/,''));
  if(clean.length===0)return'？';
  const vIdx=clean.findIndex(p=>VOWELS.includes(p));
  if(vIdx===-1)return clean.map(p=>CODA_CN[p]||p).join('');
  const onset=clean.slice(0,vIdx);
  const vowel=clean[vIdx];
  const coda=clean.slice(vIdx+1);
  let key;
  if(onset.length>0){
    key=onset[onset.length-1]+'+'+vowel;
  }else{
    key=vowel;
  }
  let cn=SYL2CN[key]||'';
  if(!cn){
    cn=SYL2CN[vowel]||vowel;
  }
  if(coda.length>0&&cn){
    const codaCn=coda.map(p=>CODA_CN[p]||'').filter(Boolean).join('');
    if(codaCn)cn+=codaCn;
  }
  return cn||clean.map(p=>SYL2CN[p]||CODA_CN[p]||p).join('');
}

function genChineseApprox(phonemes){
  const syls=splitSyllables(phonemes);
  return syls.map(s=>syllToChinese(s));
}

function syllToStr(syl){
  return syl.map(p=>p.replace(/[012]$/,'')).join(' ');
}

function wordToPhonetic(phonemeStr){
  return phonemeStr.split(' ').map(p=>p.replace(/([012])$/,(m)=>['','ˈ','ˌ'][parseInt(m)])).join(' ');
}

let currentWord='',currentPhonemes=[],currentSyllables=[],currentChinese=[];

function lookup(word){
  word=word.trim().toLowerCase();
  if(!word)return;
  const entry=DICT[word];
  const resultDiv=document.getElementById('result');
  const notFoundDiv=document.getElementById('notFound');
  resultDiv.style.display='none';
  notFoundDiv.style.display='none';
  if(!entry){
    notFoundDiv.textContent='😕 找不到「'+word+'」，試試其他單字';
    notFoundDiv.style.display='block';
    return;
  }
  const phonemeStr=entry.p;
  const phonemes=phonemeStr.split(' ');
  const syllables=splitSyllables(phonemes);
  let chineseApprox;
  if(entry.z){
    chineseApprox=entry.z.split('');
  }else{
    chineseApprox=genChineseApprox(phonemes);
  }
  currentWord=word;
  currentPhonemes=phonemes;
  currentSyllables=syllables;
  currentChinese=chineseApprox;
  document.getElementById('wordDisplay').textContent=word;
  document.getElementById('phoneticDisplay').textContent='/'+wordToPhonetic(phonemeStr)+'/';
  const sylHtml=syllables.map(s=>syllToStr(s)).join('<span class="dot">・</span>');
  document.getElementById('syllableDisplay').innerHTML=sylHtml;
  const cnHtml=chineseApprox.join('<span class="dot">・</span>');
  document.getElementById('chineseDisplay').innerHTML=cnHtml;
  document.getElementById('meaningDisplay').textContent=entry.m;
  let ex=entry.e;
  const regex=new RegExp(word,'gi');
  ex=ex.replace(regex,'<strong>$&</strong>');
  document.getElementById('exampleDisplay').innerHTML=ex;
  resultDiv.style.display='block';
  addHistory(word);
  document.getElementById('stopBtn').style.display='none';
}

function speak(text,rate=0.9){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';
  u.rate=rate;
  u.pitch=1;
  u.volume=1;
  const voices=window.speechSynthesis.getVoices();
  const enVoice=voices.find(v=>v.lang.startsWith('en'));
  if(enVoice)u.voice=enVoice;
  window.speechSynthesis.speak(u);
  return u;
}

function speakSyllables(syllables,rate=0.7){
  window.speechSynthesis.cancel();
  let i=0;
  function speakNext(){
    if(i>=syllables.length)return;
    const sylStr=syllables[i].join(' ');
    const u=new SpeechSynthesisUtterance(sylStr);
    u.lang='en-US';
    u.rate=rate;
    u.pitch=1;
    u.volume=1;
    const voices=window.speechSynthesis.getVoices();
    const enVoice=voices.find(v=>v.lang.startsWith('en'));
    if(enVoice)u.voice=enVoice;
    u.onend=()=>{i++;setTimeout(speakNext,400)};
    window.speechSynthesis.speak(u);
  }
  speakNext();
}

document.getElementById('searchBtn').addEventListener('click',()=>{
  lookup(document.getElementById('wordInput').value);
});
document.getElementById('wordInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')lookup(document.getElementById('wordInput').value);
});
document.getElementById('playBtn').addEventListener('click',()=>{
  if(currentWord)speak(currentWord,0.9);
});
document.getElementById('slowBtn').addEventListener('click',()=>{
  if(currentWord)speak(currentWord,0.35);
});
document.getElementById('syllableBtn').addEventListener('click',()=>{
  if(currentSyllables.length>0)speakSyllables(currentSyllables,0.6);
});
document.getElementById('stopBtn').addEventListener('click',()=>{
  window.speechSynthesis.cancel();
  document.getElementById('stopBtn').style.display='none';
});

if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.getVoices()};
}

function addHistory(word){
  let h=JSON.parse(localStorage.getItem('engHist')||'[]');
  h=h.filter(w=>w!==word);
  h.unshift(word);
  if(h.length>12)h=h.slice(0,12);
  localStorage.setItem('engHist',JSON.stringify(h));
  renderHistory();
}
function clearHistory(){
  localStorage.removeItem('engHist');
  renderHistory();
}
function renderHistory(){
  const tags=document.getElementById('historyTags');
  const h=JSON.parse(localStorage.getItem('engHist')||'[]');
  if(h.length===0){
    tags.innerHTML='<span style="color:#a0aec0;font-size:13px">還沒有查詢紀錄</span>';
    return;
  }
  tags.innerHTML=h.map(w=>'<span data-word="'+w+'">'+w+'</span>').join('')
    +'<span class="clear-btn" id="clearHistBtn">清除</span>';
  tags.querySelectorAll('span[data-word]').forEach(el=>{
    el.addEventListener('click',()=>{
      document.getElementById('wordInput').value=el.dataset.word;
      lookup(el.dataset.word);
    });
  });
  const cb=document.getElementById('clearHistBtn');
  if(cb)cb.addEventListener('click',clearHistory);
}
renderHistory();

let sortedWords=[],wordlistInitialized=false;
function initWordlist(){
  sortedWords=Object.keys(DICT).sort();
  document.getElementById('wordlistCount').textContent='共 '+sortedWords.length+' 個單字';
  renderLetterTabs();
  wordlistInitialized=true;
}
function renderLetterTabs(){
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const tabs=document.getElementById('letterTabs');
  tabs.innerHTML=letters.map(l=>'<span class="letter-tab" data-letter="'+l+'">'+l+'</span>').join('');
  tabs.querySelectorAll('.letter-tab').forEach(el=>{
    el.addEventListener('click',()=>showWordsByLetter(el.dataset.letter));
  });
}
function showWordsByLetter(letter){
  document.querySelectorAll('.letter-tab').forEach(el=>el.classList.toggle('active',el.dataset.letter===letter));
  const words=sortedWords.filter(w=>w.startsWith(letter.toLowerCase()));
  const container=document.getElementById('wordlistWords');
  if(words.length===0){
    container.innerHTML='<span style="color:#a0aec0;font-size:14px">沒有以 '+letter+' 開頭的單字</span>';
    return;
  }
  container.innerHTML=words.map(w=>'<span class="wordlist-word" data-word="'+w+'">'+w+'</span>').join('');
  container.querySelectorAll('.wordlist-word').forEach(el=>{
    el.addEventListener('click',()=>{
      document.getElementById('wordInput').value=el.dataset.word;
      lookup(el.dataset.word);
      closeWordlist();
    });
  });
}
function openWordlist(){
  if(!wordlistInitialized)initWordlist();
  document.getElementById('wordlistSection').style.display='block';
  document.getElementById('result').style.display='none';
  document.getElementById('notFound').style.display='none';
  showWordsByLetter('A');
}
function closeWordlist(){
  document.getElementById('wordlistSection').style.display='none';
}
document.getElementById('showWordlistBtn').addEventListener('click',openWordlist);
document.getElementById('closeWordlistBtn').addEventListener('click',closeWordlist);

document.getElementById('wordInput').focus();
</script>
<script src="dict.js"></script>
